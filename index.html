<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StationBrain | Operational Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-teal: #0d9488; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .dark { background-color: #121212; color: #e5e7eb; }
        .card { background: white; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .dark .card { background: #1e1e1e; border-color: #333; }
        .missing-info-card { border-left: 4px solid #f59e0b; background: #fffbeb; }
        .dark .missing-info-card { background: #2d2613; border-left-color: #d97706; }
        .report-narrative-card { border-left: 4px solid var(--brand-teal); background: #f0fdfa; }
        .dark .report-narrative-card { background: #132a26; }
        .status-pill { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: var(--brand-teal); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="transition-colors duration-200">

    <div class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <header class="sticky top-0 z-20 px-4 py-3 border-b flex justify-between items-center bg-white dark:bg-[#121212] dark:border-zinc-800">
            <div>
                <h1 class="font-bold text-lg tracking-tight">StationBrain</h1>
                <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Operational Support</p>
            </div>
            <button onclick="document.documentElement.classList.toggle('dark')" class="p-2">🌙</button>
        </header>

        <main id="appContent" class="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
            
            <!-- INPUT SECTION -->
            <section id="inputSection" class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] font-bold text-zinc-400 uppercase">Incident Date</label>
                        <input type="date" id="reportDate" class="w-full p-2 text-sm border rounded dark:bg-zinc-900 dark:border-zinc-800">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-zinc-400 uppercase">Incident Time</label>
                        <input type="time" id="reportTime" class="w-full p-2 text-sm border rounded dark:bg-zinc-900 dark:border-zinc-800">
                    </div>
                </div>

                <textarea id="rawInput" class="w-full h-32 p-4 rounded-xl border-2 border-zinc-200 dark:border-zinc-800 dark:bg-zinc-900 text-sm outline-none focus:border-teal-600" placeholder="Enter rough notes, unit# info, or incident details..."></textarea>

                <!-- HANDOVER SPECIFIC FIELDS (Hidden by default) -->
                <div id="handoverFields" class="hidden space-y-4">
                    <div class="card p-4 rounded-xl shadow-sm">
                        <label class="text-[10px] font-extrabold text-teal-600 uppercase tracking-widest block mb-2">Mandatory Checks</label>
                        <div id="mandatoryChecksContainer" class="space-y-2 text-sm"></div>
                    </div>
                    <div class="card p-4 rounded-xl shadow-sm space-y-3">
                        <label class="text-[10px] font-extrabold text-teal-600 uppercase tracking-widest block">Training & Activities</label>
                        <div class="space-y-2">
                            <select id="classesDone" class="w-full p-2 text-xs border rounded dark:bg-zinc-800" onchange="document.getElementById('classDetail').classList.toggle('hidden', this.value==='no')">
                                <option value="no">No Classes Done</option><option value="yes">Yes, Classes Done</option>
                            </select>
                            <textarea id="classDetail" class="hidden w-full p-2 text-xs border rounded dark:bg-zinc-800" placeholder="Topic, duration, attendance..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- MODE SELECTORS -->
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setMode('small_incident_report')" id="btn_sir" class="col-span-2 p-4 rounded-lg bg-zinc-900 text-white dark:bg-white dark:text-zinc-900 font-bold text-xs uppercase tracking-widest">📄 Small Incident Report</button>
                    <button onclick="setMode('shift_handover')" id="btn_sh" class="p-3 rounded-lg border border-zinc-200 dark:border-zinc-700 font-semibold text-xs">🔄 Handover</button>
                    <button onclick="setMode('after_action_review')" class="p-3 rounded-lg border border-zinc-200 dark:border-zinc-700 font-semibold text-xs">📝 AAR Review</button>
                </div>

                <button id="generateBtn" onclick="generateReport()" class="hidden w-full p-4 rounded-lg bg-teal-600 text-white font-bold text-xs uppercase tracking-widest shadow-lg">Generate Report</button>
            </section>

            <!-- RESULTS SECTION -->
            <section id="resultsSection" class="hidden space-y-4 pb-12">
                <div class="flex justify-between items-center border-b pb-2 dark:border-zinc-800">
                    <h2 id="resultTitle" class="text-sm font-bold uppercase tracking-widest text-zinc-500">Output</h2>
                    <button onclick="location.reload()" class="text-xs font-bold text-teal-600 uppercase">New Entry</button>
                </div>
                <div id="resultCards" class="space-y-4"></div>
                <div class="pt-4 border-t dark:border-zinc-800 space-y-2">
                    <button onclick="exportReport('word')" class="w-full py-3 bg-teal-600 text-white rounded-lg text-xs font-bold uppercase tracking-widest">Copy for Word (Formatted)</button>
                    <button onclick="exportReport('text')" class="w-full py-3 bg-zinc-100 dark:bg-zinc-800 rounded-lg text-xs font-bold uppercase">Copy Plain Text</button>
                </div>
            </section>

            <section id="loadingState" class="hidden flex-col items-center justify-center py-20"><div class="spinner mb-4"></div><p class="text-xs font-bold uppercase text-zinc-500">Processing...</p></section>
        </main>
    </div>

    <script>
        const STATE = { mode: '', data: {} };
        const CHECKS = ["Occurrence book checked", "Telephone book checked", "Unit checked", "Equipment checked", "Checklist signed", "Forecast done", "Status book written up", "Status book signed"];

        // Initialize Mandatory Checks
        const container = document.getElementById('mandatoryChecksContainer');
        CHECKS.forEach(check => {
            const div = document.createElement('div');
            div.className = "flex justify-between items-center py-1 border-b dark:border-zinc-800";
            div.innerHTML = `<span>${check}</span><select class="m-check p-1 text-[10px] rounded border dark:bg-zinc-800" data-label="${check}"><option value="not_stated">Not Stated</option><option value="yes">Yes</option><option value="no">No</option></select>`;
            container.appendChild(div);
        });

        function setMode(mode) {
            STATE.mode = mode;
            // UI Toggles
            document.getElementById('handoverFields').classList.toggle('hidden', mode !== 'shift_handover');
            document.getElementById('generateBtn').classList.remove('hidden');
            // Highlighting active button logic could go here
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        async function generateReport() {
            const input = document.getElementById('rawInput').value.trim();
            if (!input && STATE.mode !== 'shift_handover') return alert("Please enter notes.");

            showSection('loadingState');

            // Gather inputs
            const payload = {
                input,
                date: document.getElementById('reportDate').value || '[not provided]',
                time: document.getElementById('reportTime').value || '[not provided]',
                checks: Array.from(document.querySelectorAll('.m-check')).map(c => ({label: c.dataset.label, val: c.value})),
                classes: document.getElementById('classDetail').value
            };

            setTimeout(() => {
                STATE.data = mockAI(STATE.mode, payload);
                renderResults(STATE.data);
                showSection('resultsSection');
            }, 800);
        }

        function renderResults(data) {
            const container = document.getElementById('resultCards');
            container.innerHTML = '';
            document.getElementById('resultTitle').innerText = STATE.mode.replace(/_/g, ' ');

            Object.entries(data).forEach(([key, val]) => {
                if (!val || key === 'meta') return;
                const isWarning = ['missing_information', 'follow_up_questions'].includes(key);
                const card = document.createElement('div');
                card.className = `${isWarning ? 'missing-info-card' : 'card'} p-4 rounded-xl text-sm shadow-sm`;
                card.innerHTML = `<h3 class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest mb-1">${key.replace(/_/g, ' ')}</h3>
                                  <div class="${key==='final_report'?'font-medium leading-relaxed':''}">${Array.isArray(val) ? `<ul class='list-disc ml-4'>${val.map(v=>`<li>${v}</li>`).join('')}</ul>` : `<p>${val}</p>`}</div>`;
                container.appendChild(card);
            });
        }

        function exportReport(type) {
            const d = STATE.data;
            const title = STATE.mode.replace(/_/g, ' ').toUpperCase();
            
            let plain = `${title}\nDate: ${d.meta.date}\nTime: ${d.meta.time}\n\n`;
            let html = `<h2>${title}</h2><p><b>Date:</b> ${d.meta.date}<br><b>Time:</b> ${d.meta.time}</p><hr>`;

            Object.entries(d).forEach(([key, val]) => {
                if (['meta', 'missing_information', 'follow_up_questions'].includes(key)) return;
                const label = key.replace(/_/g, ' ').toUpperCase();
                plain += `${label}:\n${Array.isArray(val) ? val.join('\n') : val}\n\n`;
                html += `<h4>${label}</h4>${Array.isArray(val) ? `<ul>${val.map(v=>`<li>${v}</li>`).join('')}</ul>` : `<p>${val}</p>`}`;
            });

            if (type === 'text') {
                copy(plain);
            } else {
                copyComplex(plain, html);
            }
        }

        async function copy(text) {
            await navigator.clipboard.writeText(text);
            alert("Copied as plain text.");
        }

        async function copyComplex(text, html) {
            try {
                const data = [new ClipboardItem({
                    "text/plain": new Blob([text], { type: "text/plain" }),
                    "text/html": new Blob([html], { type: "text/html" })
                })];
                await navigator.clipboard.write(data);
                alert("Formatted for Word! Paste into document.");
            } catch (e) {
                copy(text); // Fallback
            }
        }

        function showSection(id) {
            ['inputSection', 'resultsSection', 'loadingState'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function mockAI(mode, p) {
            const base = { meta: { date: p.date, time: p.time } };
            if (mode === 'small_incident_report') {
                return { ...base, final_report: `At arrival at the given location, the brigade observed fire... return to base in unit#5-19.`, missing_information: ["Property owner details"] };
            }
            if (mode === 'shift_handover') {
                const checks = p.checks.map(c => `${c.label}: ${c.val.toUpperCase()}`).join('\n');
                return { ...base, summary: p.input || "Routine shift.", mandatory_checks: checks, training: p.classes || "None.", follow_up_questions: ["Was the hydrant pressure checked?"] };
            }
            return { ...base, summary: "Completed " + mode };
        }
    </script>
</body>
</html>
