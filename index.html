<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StationBrain | Operational Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-teal: #0d9488; --brand-teal-dark: #0f766e; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .dark { background-color: #121212; color: #e5e7eb; }
        .card { background: white; border: 1px solid #e5e7eb; }
        .dark .card { background: #1e1e1e; border-color: #333; }
        .missing-info-card { border-left: 4px solid #f59e0b; background: #fffbeb; }
        .dark .missing-info-card { background: #2d2613; border-left-color: #d97706; }
        .sop-note { font-size: 9px; font-style: italic; color: #6b7280; margin-top: 4px; }
        .status-pill { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; text-transform: uppercase; }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-warning { background: #fef3c7; color: #92400e; }
        .status-error { background: #fee2e2; color: #991b1b; }
        .input-group { border-bottom: 1px solid #f3f4f6; padding: 12px 0; }
        .dark .input-group { border-color: #27272a; }
        .section-label { font-size: 11px; font-weight: 800; color: var(--brand-teal); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: block; }
    </style>
</head>
<body class="transition-colors duration-200">

    <div class="max-w-md mx-auto min-h-screen flex flex-col relative">
        
        <!-- Header -->
        <header class="sticky top-0 z-20 px-4 py-3 border-b flex justify-between items-center bg-white dark:bg-[#121212] dark:border-zinc-800">
            <div>
                <h1 class="font-bold text-lg tracking-tight text-zinc-900 dark:text-white">StationBrain</h1>
                <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Operational Handover Tool</p>
            </div>
            <button id="themeToggle" class="p-2 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800">
                <span id="themeIcon">🌙</span>
            </button>
        </header>

        <!-- Safety Disclaimer -->
        <div class="bg-zinc-100 dark:bg-zinc-900 px-4 py-2 text-[10px] text-zinc-500 border-b dark:border-zinc-800 leading-tight">
            <strong>SOP SAFEGUARD:</strong> Items below are operational station requirements unless explicitly confirmed as official JFB SOP.
        </div>

        <!-- Main Content -->
        <main id="appContent" class="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
            
            <!-- Input Screen -->
            <section id="inputSection" class="space-y-6">
                
                <div class="space-y-2">
                    <label class="section-label">A. Shift Overview</label>
                    <textarea id="rawInput" class="w-full h-24 p-3 rounded-lg border-2 border-zinc-200 dark:border-zinc-800 dark:bg-zinc-900 text-sm" placeholder="General summary, incidents, and pending matters..."></textarea>
                    <input type="text" id="officerInCharge" class="w-full p-2 border rounded text-sm dark:bg-zinc-800 dark:border-zinc-700" placeholder="Officer in Charge (District Officer Name)">
                </div>

                <!-- Handover Sections -->
                <div class="space-y-4">
                    <!-- B. Mandatory Checks -->
                    <div class="card p-4 rounded-xl shadow-sm">
                        <label class="section-label">B. Mandatory Checks</label>
                        <div id="mandatoryChecks" class="space-y-2">
                            <!-- Helper for generation -->
                        </div>
                    </div>

                    <!-- C. Training & Activities -->
                    <div class="card p-4 rounded-xl shadow-sm space-y-3">
                        <label class="section-label">C. Training & Activities</label>
                        <div class="flex justify-between items-center text-sm">
                            <span>Classes done?</span>
                            <select id="classesDone" class="bg-zinc-100 dark:bg-zinc-800 p-1 rounded text-xs" onchange="toggleBox('classBox', this.value)">
                                <option value="no">No</option><option value="yes">Yes</option>
                            </select>
                        </div>
                        <textarea id="classBox" class="hidden w-full p-2 border rounded text-xs dark:bg-zinc-800" placeholder="Class details..."></textarea>
                        
                        <div class="flex justify-between items-center text-sm">
                            <span>Activities done?</span>
                            <select id="activitiesDone" class="bg-zinc-100 dark:bg-zinc-800 p-1 rounded text-xs" onchange="toggleBox('activityBox', this.value)">
                                <option value="no">No</option><option value="yes">Yes</option>
                            </select>
                        </div>
                        <textarea id="activityBox" class="hidden w-full p-2 border rounded text-xs dark:bg-zinc-800" placeholder="Activity details..."></textarea>
                    </div>

                    <!-- D. Personnel Status -->
                    <div class="card p-4 rounded-xl shadow-sm space-y-2">
                        <label class="section-label">D. Personnel Status</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="onStrength" class="p-2 border rounded text-xs dark:bg-zinc-800" placeholder="On Strength (#)">
                            <input type="text" id="absent" class="p-2 border rounded text-xs dark:bg-zinc-800" placeholder="Absent/Relief">
                        </div>
                        <textarea id="dutyAssignments" class="w-full p-2 border rounded text-xs dark:bg-zinc-800" placeholder="Duty assignments (DO, Sgt, Cpl, LCpl, FF)"></textarea>
                    </div>

                    <!-- E. Unit & Equipment Readiness -->
                    <div class="card p-4 rounded-xl shadow-sm space-y-2">
                        <label class="section-label">E. Unit & Equipment Readiness</label>
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            <select id="fuelStatus" class="p-2 border rounded dark:bg-zinc-800"><option value="not_stated">Fuel: Not Stated</option><option value="full">Fuel: Full</option><option value="below_full">Fuel: Below Full</option></select>
                            <select id="waterStatus" class="p-2 border rounded dark:bg-zinc-800"><option value="not_stated">Water: Not Stated</option><option value="full">Water: Full</option></select>
                        </div>
                        <div class="flex justify-between items-center text-xs p-1">
                            <span>Pump Readiness?</span>
                            <select id="pumpReady" class="bg-zinc-100 dark:bg-zinc-800 p-1 rounded"><option value="yes">Yes</option><option value="no">No</option><option value="not_stated">Not Stated</option></select>
                        </div>
                        <textarea id="unitDefects" class="w-full p-2 border rounded text-xs dark:bg-zinc-800" placeholder="Note any defects on unit#, radio, or tools..."></textarea>
                    </div>

                    <!-- F. BA & PPE -->
                    <div class="card p-4 rounded-xl shadow-sm space-y-2">
                        <label class="section-label">F. BA & PPE</label>
                        <div class="flex justify-between items-center text-xs">
                            <span>BA Sets Checked?</span>
                            <select id="baChecked" class="bg-zinc-100 dark:bg-zinc-800 p-1 rounded"><option value="not_stated">Not Stated</option><option value="yes">Yes</option><option value="no">No</option></select>
                        </div>
                        <textarea id="ppeNotes" class="w-full p-2 border rounded text-xs dark:bg-zinc-800" placeholder="BA cleaning, PPE defects, or contamination follow-up..."></textarea>
                    </div>

                    <!-- G. Station / Safety / Admin -->
                    <div class="card p-4 rounded-xl shadow-sm space-y-2">
                        <label class="section-label">G. Station / Safety / Admin</label>
                        <textarea id="adminNotes" class="w-full p-2 border rounded text-xs dark:bg-zinc-800" placeholder="Injuries, station defects, outstanding reports, unsigned items..."></textarea>
                    </div>
                </div>

                <button onclick="processHandover()" class="w-full p-4 rounded-lg bg-teal-600 text-white font-bold text-xs uppercase tracking-widest shadow-lg">
                    Generate Structured Handover
                </button>
            </section>

            <!-- Results Screen -->
            <section id="resultsSection" class="hidden space-y-4 pb-12">
                <div class="flex justify-between items-center border-b pb-2 dark:border-zinc-800">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-zinc-500">Handover Output</h2>
                    <button onclick="resetApp()" class="text-xs font-bold text-teal-600 uppercase">New Entry</button>
                </div>
                <div id="resultCards" class="space-y-4"></div>
                <div class="flex gap-2">
                    <button onclick="copyResults()" class="flex-1 py-3 bg-zinc-900 text-white dark:bg-zinc-100 dark:text-black rounded-lg text-xs font-bold uppercase">Copy Brief</button>
                </div>
            </section>

            <!-- Loading -->
            <section id="loadingState" class="hidden flex-col items-center justify-center py-20">
                <div class="spinner mb-4"></div>
                <p class="text-zinc-500 font-bold text-xs uppercase tracking-widest text-center">Formatting Handover Accountability...</p>
            </section>
        </main>
    </div>

    <script>
        const MANDATORY_ITEMS = [
            "Occurrence book checked", "Telephone book checked", "Unit checked", 
            "Equipment checked", "Checklist signed", "Forecast done", 
            "Status book written up", "Status book signed"
        ];

        // Init UI
        const checkCont = document.getElementById('mandatoryChecks');
        MANDATORY_ITEMS.forEach(item => {
            const div = document.createElement('div');
            div.className = "flex justify-between items-center text-sm py-1 border-b dark:border-zinc-800";
            div.innerHTML = `<span>${item}</span>
                <select class="m-check bg-zinc-100 dark:bg-zinc-800 p-1 rounded text-[10px]" data-label="${item}">
                    <option value="not_stated">Not Stated</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>`;
            checkCont.appendChild(div);
        });

        function toggleBox(id, val) { document.getElementById(id).classList.toggle('hidden', val === 'no'); }

        async function processHandover() {
            showSection('loadingState');
            
            // Gather Data
            const data = {
                overview: document.getElementById('rawInput').value,
                oic: document.getElementById('officerInCharge').value,
                mandatory: Array.from(document.querySelectorAll('.m-check')).map(c => ({label: c.dataset.label, val: c.value})),
                training: { classes: document.getElementById('classesDone').value, class_details: document.getElementById('classBox').value },
                activities: { active: document.getElementById('activitiesDone').value, activity_details: document.getElementById('activityBox').value },
                personnel: { strength: document.getElementById('onStrength').value, absent: document.getElementById('absent').value, duties: document.getElementById('dutyAssignments').value },
                readiness: { fuel: document.getElementById('fuelStatus').value, water: document.getElementById('waterStatus').value, pump: document.getElementById('pumpReady').value, defects: document.getElementById('unitDefects').value },
                ba_ppe: { checked: document.getElementById('baChecked').value, notes: document.getElementById('ppeNotes').value },
                admin: document.getElementById('adminNotes').value
            };

            setTimeout(() => {
                renderHandoverOutput(data);
                showSection('resultsSection');
            }, 1000);
        }

        function renderHandoverOutput(d) {
            const container = document.getElementById('resultCards');
            container.innerHTML = '';

            // SOP SAFEGUARD NOTE
            const safeguard = document.createElement('div');
            safeguard.className = "bg-zinc-50 dark:bg-zinc-900 p-3 border rounded text-[10px] text-zinc-500 mb-4";
            safeguard.innerHTML = "<strong>NOTICE:</strong> Handover items are treated as operational/station requirements unless explicitly confirmed as official JFB SOP.";
            container.appendChild(safeguard);

            createCard(container, "Shift Overview", `<p><strong>OIC:</strong> ${d.oic || 'Not stated'}</p><p class="mt-2">${d.overview || 'No summary provided.'}</p>`);
            
            // Mandatory Checks
            let checksHtml = d.mandatory.map(c => {
                const status = c.val === 'yes' ? 'Completed' : (c.val === 'no' ? 'Not Completed' : 'Not Stated');
                const pClass = c.val === 'yes' ? 'status-completed' : (c.val === 'no' ? 'status-error' : 'status-warning');
                return `<div class="flex justify-between items-center text-xs py-1"><span>${c.label}</span><span class="status-pill ${pClass}">${status}</span></div>`;
            }).join('');
            createCard(container, "Mandatory Checks (Station Requirement)", checksHtml);

            createCard(container, "Personnel Status", `<p><strong>On Strength:</strong> ${d.personnel.strength || 'NS'}</p><p><strong>Absences/Relief:</strong> ${d.personnel.absent || 'NS'}</p><p class="mt-1"><strong>Assignments:</strong> ${d.personnel.duties || 'NS'}</p>`);
            
            createCard(container, "Unit Readiness (unit#)", `<p><strong>Fuel:</strong> ${d.readiness.fuel} | <strong>Water:</strong> ${d.readiness.water}</p><p><strong>Pump Ready:</strong> ${d.readiness.pump}</p><div class="mt-2 p-2 bg-zinc-50 dark:bg-zinc-800 rounded">Defects: ${d.readiness.defects || 'None noted'}</div>`);
            
            createCard(container, "BA / PPE Status", `<p><strong>Sets Checked:</strong> ${d.ba_ppe.checked}</p><p class="mt-1">${d.ba_ppe.notes || 'No defects/contamination noted.'}</p>`);
            
            createCard(container, "Training & Activities", `<p><strong>Classes:</strong> ${d.training.classes} ${d.training.class_details ? '- ' + d.training.class_details : ''}</p><p><strong>Activities:</strong> ${d.activities.active} ${d.activities.activity_details ? '- ' + d.activities.activity_details : ''}</p>`);

            createCard(container, "Admin / Safety / Station", `<p>${d.admin || 'No injuries or station defects reported.'}</p>`);

            // Follow-up Logic
            const followUps = [];
            if (d.mandatory.some(c => c.val === 'not_stated')) followUps.push("Verify completion of mandatory book/checklist items.");
            if (!d.oic) followUps.push("Confirm Officer in Charge for this shift.");
            if (d.ba_ppe.checked === 'not_stated') followUps.push("Were BA sets and cylinders verified?");
            if (d.readiness.fuel === 'not_stated') followUps.push("What is the current fuel level of the unit#?");

            if (followUps.length > 0) {
                const qList = `<ul class="list-disc ml-4 space-y-1 text-amber-700 dark:text-amber-200">
                                ${followUps.map(q => `<li>${q}</li>`).join('')}
                               </ul>`;
                createCard(container, "Follow-up Questions", qList, true);
            }
        }

        function createCard(container, title, content, isWarning = false) {
            const card = document.createElement('div');
            card.className = isWarning ? 'missing-info-card p-4 rounded-xl shadow-sm' : 'card p-4 rounded-xl shadow-sm';
            card.innerHTML = `<h3 class="text-[9px] font-extrabold ${isWarning ? 'text-amber-600' : 'text-zinc-400'} tracking-widest mb-2 uppercase">${title}</h3><div class="text-sm leading-snug">${content}</div>`;
            container.appendChild(card);
        }

        function showSection(id) {
            ['inputSection', 'resultsSection', 'loadingState'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function resetApp() { location.reload(); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        function copyResults() {
            navigator.clipboard.writeText(document.getElementById('resultCards').innerText);
            alert("Handover Brief copied.");
        }
    </script>
</body>
</html>
