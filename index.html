<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StationBrain | Operational Workstation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Design Tokens & Color System */
        :root {
            /* Neutrals */
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            /* Accents */
            --accent-blue: #2563eb;
            --accent-green: #059669;
            --accent-red: #dc2626;
            --focus-ring: rgba(37, 99, 235, 0.2);
        }

        .dark {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-blue: #3b82f6;
            --focus-ring: rgba(59, 130, 246, 0.3);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-page); 
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.5;
        }

        /* Standardized Component Styling */
        .card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 1rem; }
        
        input, select, textarea {
            width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem;
            border: 1.5px solid var(--border-color); background-color: var(--bg-card);
            color: var(--text-main); font-size: 1rem; transition: all 0.2s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        /* Unified Button System */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.875rem 1.5rem; border-radius: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.025em; font-size: 0.75rem;
            transition: all 0.2s; cursor: pointer; border: 1.5px solid transparent;
        }

        .btn-primary { background-color: var(--accent-blue); color: #ffffff; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        .btn-secondary { background-color: transparent; border-color: var(--border-color); color: var(--text-main); }
        .btn-secondary:active { background-color: var(--border-color); }

        .btn-ghost-red { color: var(--accent-red); font-size: 0.7rem; border: none; background: transparent; }

        /* Status Colors */
        .text-success { color: var(--accent-green); }
        .text-danger { color: var(--accent-red); }
        .report-accent { border-left: 4px solid var(--accent-blue); }

        .spinner { 
            border: 3px solid rgba(0,0,0,0.1); width: 24px; height: 24px; border-radius: 50%; 
            border-left-color: var(--accent-blue); animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="light">

    <div class="max-w-md mx-auto flex flex-col min-h-screen shadow-sm relative">
        
        <!-- Header -->
        <header class="p-4 flex justify-between items-center sticky top-0 z-50 card border-b rounded-none">
            <div>
                <h1 class="font-extrabold text-xl tracking-tight">StationBrain</h1>
                <p id="viewLabel" class="text-[10px] uppercase tracking-widest font-bold text-blue-600">Workstation</p>
            </div>
            <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800" id="themeIcon">🌙</button>
        </header>

        <!-- Main Viewport -->
        <main id="appBody" class="flex-1 p-4 space-y-6">
            <!-- Dynamic components injected here -->
        </main>

        <!-- Navigation Context -->
        <nav id="bottomNav" class="p-4 card border-t rounded-none space-y-3 hidden sticky bottom-0">
            <div class="flex gap-2">
                <button onclick="setView('home')" class="btn btn-secondary flex-1">Back Home</button>
                <button id="actionBtn" class="btn btn-primary flex-[2]">Generate</button>
            </div>
            <div class="text-center">
                <button onclick="clearCurrentForm()" class="btn btn-ghost-red">Clear All Inputs</button>
            </div>
        </nav>

        <!-- App Footer Info -->
        <footer class="p-6 border-t dark:border-slate-800 text-center space-y-4">
            <div class="flex justify-center gap-4 text-[11px] font-bold uppercase tracking-wider text-blue-600">
                <button onclick="setView('about')">About</button>
                <span class="text-gray-300">|</span>
                <button onclick="setView('disclaimer')">Disclaimer</button>
            </div>
            <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400">
                Created by L/Cpl. R. Marshall of the Portland Division
            </p>
        </footer>
    </div>

    <script>
        const state = {
            theme: 'light',
            view: 'home',
            mode: null,
            incidentType: 'house_fire',
            formData: {},
            report: null
        };

        const CHECKS = ["Occurrence Book", "Telephone Book", "Unit Checked", "Equipment Checked", "Checklist Signed", "Forecast Done", "Status Book Written Up", "Status Book Signed"];

        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.body.className = state.theme;
            document.getElementById('themeIcon').innerText = state.theme === 'light' ? '🌙' : '☀️';
        }

        function setView(v, mode = null) {
            state.view = v;
            if (mode) state.mode = mode;
            render();
        }

        function render() {
            const body = document.getElementById('appBody');
            const nav = document.getElementById('bottomNav');
            const label = document.getElementById('viewLabel');
            body.innerHTML = '';
            nav.classList.add('hidden');

            if (state.view === 'home') {
                label.innerText = 'Main Menu';
                renderHome(body);
            } else if (state.view === 'input') {
                nav.classList.remove('hidden');
                label.innerText = state.mode.replace('_', ' ');
                renderInput(body);
                document.getElementById('actionBtn').onclick = handleGenerate;
                document.getElementById('actionBtn').innerText = 'Generate Report';
            } else if (state.view === 'result') {
                nav.classList.remove('hidden');
                label.innerText = 'Result';
                renderResult(body);
                document.getElementById('actionBtn').onclick = copyReport;
                document.getElementById('actionBtn').innerText = 'Copy Report';
            } else if (state.view === 'about') {
                label.innerText = 'About';
                renderAbout(body);
            } else if (state.view === 'disclaimer') {
                label.innerText = 'Disclaimer';
                renderDisclaimer(body);
            }
            window.scrollTo(0,0);
        }

        function renderHome(container) {
            const menus = [
                { id: 'incident', title: 'Incident Report', icon: '📄', color: 'text-blue-500' },
                { id: 'handover', title: 'Shift Handover', icon: '🔄', color: 'text-blue-500' },
                { id: 'debriefing', title: 'Debriefing', icon: '📝', color: 'text-blue-500' }
            ];
            container.innerHTML = `<div class="grid gap-3 pt-2">
                ${menus.map(m => `
                    <button onclick="setView('input', '${m.id}')" class="card p-6 flex items-center gap-4 text-left hover:border-blue-500 transition-colors">
                        <span class="text-3xl">${m.icon}</span>
                        <div>
                            <h3 class="font-extrabold text-lg leading-tight">${m.title}</h3>
                            <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Operational Support</p>
                        </div>
                    </button>
                `).join('')}
            </div>`;
        }

        function renderInput(container) {
            if (state.mode === 'incident') {
                container.innerHTML = `
                    <div class="space-y-4">
                        <select id="f_incidentType" onchange="state.incidentType=this.value; render();">
                            <option value="house_fire" ${state.incidentType === 'house_fire' ? 'selected' : ''}>House Fire</option>
                            <option value="mva" ${state.incidentType === 'mva' ? 'selected' : ''}>Motor Vehicle Accident</option>
                            <option value="false_alarm" ${state.incidentType === 'false_alarm' ? 'selected' : ''}>False Alarm</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="date" id="f_dateCall" placeholder="Date of call" value="${state.formData.dateCall || ''}">
                            <input type="time" id="f_timeCall" placeholder="Time of call" value="${state.formData.timeCall || ''}">
                        </div>
                        <input type="text" id="f_loc" placeholder="Location" value="${state.formData.loc || ''}">
                        <input type="text" id="f_unit" placeholder="unit# (e.g. 5-19)" value="${state.formData.unit || ''}">
                        <textarea id="f_notes" rows="4" placeholder="Operational details...">${state.formData.notes || ''}</textarea>
                    </div>
                `;
            } else if (state.mode === 'handover') {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="card p-4 space-y-3">
                            <p class="text-[10px] font-black uppercase text-blue-600 tracking-widest">Mandatory Checks</p>
                            ${CHECKS.map(c => `
                                <div class="flex justify-between items-center text-sm border-b pb-2 dark:border-slate-700">
                                    <span>${c}</span>
                                    <select class="sh-check w-20 font-bold text-blue-600 bg-transparent" data-label="${c}">
                                        <option value="not_stated">?</option><option value="yes">YES</option><option value="no">NO</option>
                                    </select>
                                </div>
                            `).join('')}
                        </div>
                        <textarea id="f_summary" rows="4" placeholder="Summary of shift..."></textarea>
                    </div>
                `;
            } else {
                container.innerHTML = `<textarea id="f_notes" rows="10" placeholder="Enter debrief details..."></textarea>`;
            }
        }

        function renderResult(container) {
            container.innerHTML = `
                <div class="space-y-4">
                    <div class="card p-5 report-accent shadow-sm">
                        <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Narrative</h3>
                        <p class="text-sm leading-relaxed whitespace-pre-wrap">${state.report.narrative}</p>
                    </div>
                    ${state.report.checks ? `
                        <div class="card p-4 space-y-2">
                            <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1">Checklist Summary</h3>
                            ${state.report.checks.map(c => `
                                <div class="flex justify-between text-xs border-b pb-1 dark:border-slate-700">
                                    <span>${c.label}</span>
                                    <span class="font-bold ${c.val === 'yes' ? 'text-success' : (c.val === 'no' ? 'text-danger' : 'text-slate-400')}">${c.status}</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderAbout(container) {
            container.innerHTML = `
                <div class="card p-6 space-y-4 text-sm">
                    <h2 class="font-extrabold text-lg">About StationBrain</h2>
                    <p>Developed by <strong>L/CPL R. Marshall</strong> to assist with operational reporting and handovers.</p>
                    <p>Designed for rapid drafting under time pressure, utilizing real Jamaica Fire Brigade station practices.</p>
                    <button onclick="setView('home')" class="btn btn-secondary w-full">Back to Menu</button>
                </div>
            `;
        }

        function renderDisclaimer(container) {
            container.innerHTML = `
                <div class="card p-6 space-y-4 text-sm">
                    <h2 class="font-extrabold text-lg text-danger">Disclaimer</h2>
                    <p>StationBrain is an <strong>unofficial support tool</strong> and does not replace official JFB reporting procedures.</p>
                    <p>All reports must be reviewed by the appropriate District Officer. L/CPL R. Marshall accepts no liability for errors.</p>
                    <button onclick="setView('home')" class="btn btn-secondary w-full">Back to Menu</button>
                </div>
            `;
        }

        function handleGenerate() {
            saveInputs();
            const body = document.getElementById('appBody');
            body.innerHTML = `<div class="flex flex-col items-center py-20 gap-4"><div class="spinner"></div><p class="text-xs font-bold uppercase tracking-widest text-slate-400">Processing Data...</p></div>`;
            
            setTimeout(() => {
                const checks = [];
                document.querySelectorAll('.sh-check').forEach(el => {
                    checks.push({ 
                        label: el.dataset.label, 
                        val: el.value, 
                        status: el.value === 'yes' ? '✅ DONE' : (el.value === 'no' ? '❌ NO' : '⚠️ ?') 
                    });
                });
                
                const d = state.formData;
                let narrative = "";
                if (state.mode === 'incident') {
                    narrative = `At arrival at the given location, brigade observed ${state.incidentType.replace('_', ' ')}. ${d.notes || ''} Seeing no threat of re-ignition, brigade refilled unit pump and tank and returned in unit#${d.unit || '[not entered]'}.`;
                } else if (state.mode === 'handover') {
                    narrative = `SHIFT HANDOVER: ${d.summary || 'Routine shift operations.'}`;
                } else {
                    narrative = `DEBRIEF: ${d.notes || 'No notes provided.'}`;
                }

                state.report = { narrative, checks: checks.length ? checks : null };
                state.view = 'result';
                render();
            }, 800);
        }

        function saveInputs() {
            document.querySelectorAll('input, textarea, select').forEach(i => {
                if (i.id) state.formData[i.id.replace('f_', '')] = i.value;
            });
        }

        function clearCurrentForm() {
            if (confirm("Clear all current inputs?")) {
                state.formData = {};
                render();
            }
        }

        async function copyReport() {
            const text = `${state.report.narrative}\n\nGenerated via StationBrain\nCreated by L/Cpl R. Marshall`;
            await navigator.clipboard.writeText(text);
            alert("Report copied successfully.");
        }

        render();
    </script>
</body>
</html>
