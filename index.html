<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StationBrain | Operational Workstation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-teal: #0d9488; --brand-teal-dark: #0f766e; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .light { background-color: #f3f4f6; color: #1f2937; }
        .dark { background-color: #0f172a; color: #f8fafc; }
        
        .card { transition: background-color 0.3s, border-color 0.3s; border-width: 1px; }
        .light .card { background-color: #ffffff; border-color: #e5e7eb; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        .dark .card { background-color: #1e293b; border-color: #334155; }
        
        .report-box { border-left: 4px solid var(--brand-teal); }
        .missing-box { border-left: 4px solid #f59e0b; background-color: rgba(245, 158, 11, 0.1); }
        
        .spinner { border: 3px solid rgba(0,0,0,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: var(--brand-teal); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #d1d5db; font-size: 0.875rem; outline: none; transition: border-color 0.2s; }
        .dark input, .dark select, .dark textarea { background-color: #0f172a; border-color: #334155; color: white; }
        input:focus, textarea:focus, select:focus { border-color: var(--brand-teal); box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.2); }
        
        .no-print { @media print { display: none; } }
    </style>
</head>
<body class="light">

    <div class="max-w-md mx-auto min-h-screen flex flex-col relative shadow-2xl bg-inherit">
        
        <!-- Header -->
        <header class="p-4 flex justify-between items-center sticky top-0 z-50 card border-b shadow-sm">
            <div>
                <h1 class="font-extrabold text-xl tracking-tight">StationBrain</h1>
                <p id="currentModeLabel" class="text-[10px] uppercase tracking-widest text-teal-600 font-bold">Main Menu</p>
            </div>
            <button onclick="toggleTheme()" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-lg" id="themeIcon">🌙</button>
        </header>

        <!-- Main Content Area -->
        <main id="mainView" class="flex-1 p-4 space-y-4">
            <!-- Dynamic Content Injected Here -->
        </main>

        <!-- Persistent Navigation for Forms -->
        <nav id="globalNav" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 card border-t flex gap-2 hidden no-print">
            <button onclick="goHome()" class="flex-1 py-3 rounded-lg bg-slate-200 dark:bg-slate-800 font-bold text-xs uppercase tracking-wider">Back Home</button>
            <button onclick="clearCurrentForm()" class="px-4 py-3 rounded-lg bg-red-100 dark:bg-red-900/30 text-red-600 font-bold text-xs uppercase tracking-wider">Clear</button>
        </nav>

        <!-- UI Footer (Excludes from Exports) -->
        <footer id="appFooter" class="p-6 text-center border-t dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 no-print">
            <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400">
                Created by L/Cpl. R. Marshall of the Portland Division
            </p>
        </footer>
    </div>

    <script>
        /**
         * APPLICATION STATE
         */
        let state = {
            theme: 'light',
            view: 'home',
            mode: null,
            incidentType: 'house_fire',
            formData: {},
            report: null
        };

        const HANDOVER_CHECKS = [
            "Occurrence Book Checked", "Telephone Book Checked", "Unit Checked", 
            "Equipment Checked", "Checklist Signed", "Forecast Done", 
            "Status Book Written Up", "Status Book Signed"
        ];

        /**
         * CORE UI FUNCTIONS
         */
        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.body.className = state.theme;
            document.getElementById('themeIcon').innerText = state.theme === 'light' ? '🌙' : '☀️';
        }

        function goHome() {
            state.view = 'home';
            state.mode = null;
            state.formData = {};
            state.report = null;
            render();
        }

        function clearCurrentForm() {
            if(confirm("Wipe all inputs for this module?")) {
                state.formData = {};
                render();
            }
        }

        function selectMode(m) {
            state.mode = m;
            state.view = 'input';
            render();
        }

        /**
         * RENDER LOGIC
         */
        function render() {
            const main = document.getElementById('mainView');
            const nav = document.getElementById('globalNav');
            const label = document.getElementById('currentModeLabel');
            
            main.innerHTML = '';
            nav.classList.add('hidden');
            label.innerText = state.mode ? state.mode.replace('_', ' ') : 'Main Menu';

            if (state.view === 'home') {
                renderHome(main);
            } else if (state.view === 'input') {
                nav.classList.remove('hidden');
                renderInputForm(main);
            } else if (state.view === 'result') {
                nav.classList.remove('hidden');
                renderResult(main);
            }
            window.scrollTo(0,0);
        }

        function renderHome(container) {
            const modules = [
                { id: 'incident', title: 'Incident Report', icon: '📄', desc: 'Narrative & Sub-types' },
                { id: 'handover', title: 'Shift Handover', icon: '🔄', desc: 'Accountability & Briefing' },
                { id: 'aar', title: 'After-Action Review', icon: '📝', desc: 'Review & Training' }
            ];

            container.innerHTML = `<div class="grid grid-cols-1 gap-3 pt-2">
                ${modules.map(m => `
                    <button onclick="selectMode('${m.id}')" class="card p-6 rounded-xl flex items-center gap-4 text-left border-2 border-transparent hover:border-teal-500 transition-all active:scale-95">
                        <span class="text-3xl">${m.icon}</span>
                        <div>
                            <h3 class="font-bold text-lg leading-tight">${m.title}</h3>
                            <p class="text-[10px] uppercase text-slate-400 font-bold tracking-widest">${m.desc}</p>
                        </div>
                    </button>
                `).join('')}
            </div>`;
        }

        function renderInputForm(container) {
            let html = '';

            if (state.mode === 'incident') {
                html = `
                <div class="space-y-4">
                    <label class="text-[10px] font-bold uppercase text-slate-400 tracking-widest">Incident Type</label>
                    <select id="f_incidentType" onchange="updateIncidentType(this.value)">
                        <option value="house_fire" ${state.incidentType === 'house_fire' ? 'selected' : ''}>House Fire</option>
                        <option value="mv_fire" ${state.incidentType === 'mv_fire' ? 'selected' : ''}>Motor Vehicle Fire</option>
                        <option value="bush_fire" ${state.incidentType === 'bush_fire' ? 'selected' : ''}>Bush / Rubbish Fire</option>
                        <option value="mva" ${state.incidentType === 'mva' ? 'selected' : ''}>Motor Vehicle Accident</option>
                        <option value="false_alarm" ${state.incidentType === 'false_alarm' ? 'selected' : ''}>False Alarm</option>
                        <option value="special_service" ${state.incidentType === 'special_service' ? 'selected' : ''}>Special Service</option>
                    </select>

                    <div class="grid grid-cols-2 gap-2">
                        <input type="date" id="f_date" value="${state.formData.date || ''}">
                        <input type="time" id="f_time" value="${state.formData.time || ''}">
                    </div>
                    <input type="text" id="f_unit" placeholder="unit# (e.g. 5-19)" value="${state.formData.unit || ''}">
                    <input type="text" id="f_loc" placeholder="Location" value="${state.formData.loc || ''}">
                    
                    ${renderIncidentFields()}

                    <textarea id="f_notes" rows="4" placeholder="Additional details or rough observations...">${state.formData.notes || ''}</textarea>
                </div>`;
            } else if (state.mode === 'handover') {
                html = `<div class="space-y-4">
                    <h3 class="text-[10px] font-bold uppercase text-teal-600 tracking-widest">Mandatory Checks</h3>
                    <div class="card p-4 rounded-lg space-y-3 text-sm">
                        ${HANDOVER_CHECKS.map(c => `
                            <div class="flex justify-between items-center border-b pb-2 dark:border-slate-700">
                                <span class="text-xs font-medium">${c}</span>
                                <select class="sh-check w-24 text-xs p-1 h-8 font-bold text-teal-600" data-label="${c}">
                                    <option value="not_stated">?</option>
                                    <option value="yes">YES</option>
                                    <option value="no">NO</option>
                                </select>
                            </div>
                        `).join('')}
                    </div>
                    <textarea id="f_summary" rows="3" placeholder="General summary of incidents...">${state.formData.summary || ''}</textarea>
                    <textarea id="f_personnel" rows="2" placeholder="Personnel status: OIC (DO), Reliefs...">${state.formData.personnel || ''}</textarea>
                    <textarea id="f_defects" rows="2" placeholder="Unit defects or station issues...">${state.formData.defects || ''}</textarea>
                </div>`;
            } else if (state.mode === 'aar') {
                html = `<div class="space-y-4">
                    <textarea id="f_overview" rows="3" placeholder="Event Overview / Narrative">${state.formData.overview || ''}</textarea>
                    <textarea id="f_well" rows="3" placeholder="What went well?">${state.formData.well || ''}</textarea>
                    <textarea id="f_improve" rows="3" placeholder="What could improve?">${state.formData.improve || ''}</textarea>
                    <textarea id="f_lessons" rows="3" placeholder="Lessons learned & Training needs">${state.formData.lessons || ''}</textarea>
                </div>`;
            }

            container.innerHTML = html + `
                <button onclick="handleGenerate()" class="w-full py-4 mt-6 rounded-xl bg-teal-600 text-white font-bold uppercase tracking-widest shadow-lg active:scale-95 transition-transform">Generate Report</button>
            `;
        }

        function renderIncidentFields() {
            const t = state.incidentType;
            if (['house_fire', 'bush_fire', 'mv_fire'].includes(t)) {
                return `<input type="text" id="f_area" placeholder="${t === 'mv_fire' ? 'Vehicle Type / Reg' : 'Area Involved / Confined to'}">
                        <input type="text" id="f_jet" placeholder="Hose / Jet details (e.g. one medium jet)">`;
            } else if (t === 'mva') {
                return `<input type="text" id="f_vcount" placeholder="Number of vehicles & type">
                        <input type="text" id="f_trapped" placeholder="Persons trapped / assisted">`;
            } else if (t === 'false_alarm') {
                return `<input type="text" id="f_cause" placeholder="Cause of Alarm / Smoke scare">
                        <input type="text" id="f_left" placeholder="Person / Authority left with">`;
            } else if (t === 'special_service') {
                return `<input type="text" id="f_sstype" placeholder="Service type (Entry, Padlock, Assistance...)">
                        <input type="text" id="f_tools" placeholder="Tools used">`;
            }
            return '';
        }

        function updateIncidentType(val) {
            state.incidentType = val;
            saveCurrentInputs();
            render();
        }

        function saveCurrentInputs() {
            const inputs = document.querySelectorAll('input, textarea, select');
            inputs.forEach(i => { if(i.id) state.formData[i.id.replace('f_', '')] = i.value; });
        }

        /**
         * LOGIC ENGINE
         */
        async function handleGenerate() {
            let capturedChecks = [];
            if (state.mode === 'handover') {
                const checkElems = document.querySelectorAll('.sh-check');
                checkElems.forEach(el => {
                    const status = el.value === 'yes' ? '✅ DONE' : (el.value === 'no' ? '❌ NOT DONE' : '⚠️ NOT STATED');
                    capturedChecks.push({ label: el.dataset.label, status, raw: el.value });
                });
            }

            saveCurrentInputs();
            if (state.mode === 'incident' && !state.formData.loc) return alert("Incident Location is required.");

            const main = document.getElementById('mainView');
            main.innerHTML = `<div class="flex flex-col items-center justify-center py-20">
                <div class="spinner mb-4"></div>
                <p class="font-bold text-[10px] uppercase text-slate-500 tracking-widest text-center">Processing operational data...</p>
            </div>`;

            setTimeout(() => {
                state.report = buildReport(capturedChecks);
                state.view = 'result';
                render();
            }, 800);
        }

        function buildReport(capturedChecks) {
            const d = state.formData;
            const res = { 
                narrative: '', 
                missing: [], 
                questions: [], 
                checks: capturedChecks || [], 
                timestamp: new Date().toLocaleString('en-JM', { dateStyle: 'medium', timeStyle: 'short' }) 
            };

            if (state.mode === 'incident') {
                const unit = d.unit || '[unit# not provided]';
                if (['house_fire', 'bush_fire', 'mv_fire'].includes(state.incidentType)) {
                    res.narrative = `At arrival at the given location, the brigade observed fire involving ${d.area || 'the reported area'} and ${d.jet || 'standard operations'} was brought into operation to control and extinguish the blaze. ${d.notes || ''} Seeing no threat of re-ignition, the brigade then made up to refill the unit pump and tank and return to base in unit#${unit}.`;
                } else if (state.incidentType === 'mva') {
                    res.narrative = `At arrival at the given location, the brigade observed a motor vehicle accident involving ${d.vcount || 'vehicles'}. ${d.trapped || 'No persons'} were assisted. ${d.notes || ''} Scene was handed over to the relevant authority and brigade returned to base in unit#${unit}.`;
                } else if (state.incidentType === 'false_alarm') {
                    res.narrative = `Investigation on arrival at the location revealed the alarm was caused by ${d.cause || 'undetermined factors'}. No signs of fire found. Scene left with ${d.left || 'personnel on site'}. Brigade returned in unit#${unit}.`;
                } else {
                    res.narrative = `Special Service: ${d.sstype || 'assistance'}. Brigade assisted ${d.notes || 'at location'} using ${d.tools || 'manual tools'}. Returned to base in unit#${unit}.`;
                }
                if (!d.unit) res.missing.push("Unit number (unit#)");
                res.questions.push("Confirmed primary search conducted by OIC?");
            } else if (state.mode === 'handover') {
                res.narrative = `SHIFT HANDOVER REPORT\n\nSummary: ${d.summary || 'Routine shift.'}\n\nPersonnel Status: ${d.personnel || 'Full strength.'}\n\nDefects: ${d.defects || 'None noted.'}`;
                const sbSigned = res.checks.find(e => e.label.includes("Status Book Signed"));
                if (sbSigned && sbSigned.raw === 'no') res.questions.push("SOP Alert: Status Book must be signed immediately.");
            } else if (state.mode === 'aar') {
                res.narrative = `AFTER-ACTION REVIEW\n\nOverview: ${d.overview || 'Not provided.'}\n\nWhat Went Well: ${d.well || 'Not provided.'}\n\nTo Improve: ${d.improve || 'Not provided.'}\n\nLessons: ${d.lessons || 'Not provided.'}`;
            }

            return res;
        }

        /**
         * RESULT VIEW
         */
        function renderResult(container) {
            container.innerHTML = `
                <div class="space-y-4 animate-in fade-in duration-300">
                    <div class="text-[9px] font-bold text-teal-600 text-right uppercase tracking-widest">
                        Finalized: ${state.report.timestamp}
                    </div>

                    <div class="card p-5 rounded-xl shadow-sm report-box">
                        <h3 class="text-[10px] font-extrabold uppercase text-slate-400 tracking-widest mb-2">Final Narrative</h3>
                        <div class="text-sm leading-relaxed whitespace-pre-wrap">${state.report.narrative}</div>
                    </div>

                    ${state.report.checks.length ? `
                    <div class="card p-4 rounded-xl border dark:border-slate-700 bg-white dark:bg-slate-800">
                        <h3 class="text-[10px] font-bold uppercase text-slate-400 tracking-widest mb-3">Checklist Summary</h3>
                        <div class="space-y-2">
                            ${state.report.checks.map(c => `
                                <div class="flex justify-between text-xs border-b border-slate-100 dark:border-slate-700 pb-1">
                                    <span class="text-slate-500">${c.label}</span>
                                    <span class="font-bold">${c.status}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>` : ''}

                    ${state.report.questions.length ? `
                    <div class="card p-4 rounded-xl missing-box">
                        <h3 class="text-[10px] font-bold uppercase text-amber-600 tracking-widest mb-2">⚠️ Follow-Up Required</h3>
                        <ul class="text-xs space-y-1 list-disc ml-4 font-medium text-amber-800 dark:text-amber-200">
                            ${state.report.questions.map(q=>`<li>${q}</li>`).join('')}
                        </ul>
                    </div>` : ''}

                    <div class="grid grid-cols-1 gap-2 pt-4 no-print pb-6">
                        <button onclick="copyFullReport()" class="w-full py-4 rounded-xl bg-slate-900 text-white dark:bg-white dark:text-slate-900 font-bold uppercase text-xs tracking-widest shadow-lg active:scale-95 transition-transform">Copy Full Report</button>
                        <button onclick="copyNarrativeOnly()" class="w-full py-3 rounded-xl border-2 border-slate-900 dark:border-white font-bold uppercase text-xs active:scale-95 transition-transform">Copy Narrative Only</button>
                        <button onclick="goHome()" class="w-full py-3 text-teal-600 font-bold uppercase text-xs text-center">Start New Task</button>
                    </div>
                </div>
            `;
        }

        /**
         * CLIPBOARD LOGIC
         */
        async function copyFullReport() {
            const r = state.report;
            const checks = r.checks.length ? `CHECKLIST SUMMARY:\n` + r.checks.map(c => `${c.label}: ${c.status}`).join('\n') + `\n\n` : '';
            const text = `STATIONBRAIN REPORT: ${state.mode.toUpperCase()}\nCOMPLETED: ${r.timestamp}\n-----------------------------------\n\n${r.narrative}\n\n${checks}END OF DOCUMENT`;
            
            try {
                await navigator.clipboard.writeText(text);
                alert("Formatted report copied for external use.");
            } catch (err) {
                alert("Clipboard access denied.");
            }
        }

        async function copyNarrativeOnly() {
            await navigator.clipboard.writeText(state.report.narrative);
            alert("Narrative text copied.");
        }

        // Initialize App
        render();
    </script>
</body>
</html>
