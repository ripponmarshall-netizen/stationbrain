<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StationBrain | JFB Operational Workstation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f1f5f9; --bg-card: #ffffff; --text-main: #0f172a; --text-label: #1e40af;
            --border-color: #cbd5e1; --accent-blue: #2563eb; --accent-green: #059669; --accent-red: #dc2626;
            --focus-ring: rgba(37, 99, 235, 0.15);
        }
        .dark {
            --bg-page: #0f172a; --bg-card: #1e293b; --text-main: #f8fafc; --text-label: #7dd3fc;
            --border-color: #334155; --accent-blue: #3b82f6; --accent-green: #10b981;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-page); color: var(--text-main); transition: background-color 0.3s; height: 100%; }
        .card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 1.25rem; transition: background-color 0.3s, border-color 0.3s; }
        label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-label); margin-bottom: 0.4rem; padding-left: 0.1rem; }
        input, select, textarea {
            width: 100%; padding: 0.85rem 1rem; border-radius: 0.75rem;
            border: 2px solid var(--border-color); background-color: var(--bg-card);
            color: var(--text-main); font-size: 1rem; outline: none; transition: all 0.2s ease;
            font-weight: 500;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--focus-ring); }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 1rem 1.5rem; border-radius: 0.75rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem;
            transition: all 0.2s; border: 2.5px solid transparent; cursor: pointer;
        }
        .btn-primary { background-color: var(--accent-blue); color: #ffffff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-secondary { background-color: var(--bg-card); border-color: var(--text-main); color: var(--text-main); border: 2.2px solid; }
        .btn-ghost-red { color: var(--accent-red); font-size: 0.75rem; font-weight: 800; text-decoration: underline; background: transparent; }
        .report-accent { border-left: 6px solid var(--accent-blue); }
        .spinner { border: 3px solid rgba(0,0,0,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: var(--accent-blue); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="light">

    <div class="max-w-md mx-auto flex flex-col min-h-screen relative shadow-2xl bg-inherit no-scrollbar">
        <header class="p-4 flex justify-between items-center sticky top-0 z-50 card border-b rounded-none shadow-sm">
            <div>
                <h1 class="font-extrabold text-xl tracking-tight text-slate-900 dark:text-white">StationBrain</h1>
                <p id="viewLabel" class="text-[10px] uppercase tracking-widest font-black text-blue-600 dark:text-blue-400">Operational System</p>
            </div>
            <button onclick="toggleThemeManual()" class="p-2 rounded-full bg-slate-200 dark:bg-slate-800 text-lg" id="themeIcon">🌙</button>
        </header>

        <main id="appBody" class="flex-1 p-4 space-y-6"></main>

        <nav id="bottomNav" class="p-4 card border-t rounded-none space-y-4 hidden sticky bottom-0 z-40 bg-inherit shadow-2xl">
            <div class="flex gap-2">
                <button onclick="goHome()" class="btn btn-secondary flex-1">Menu</button>
                <button id="actionBtn" class="btn btn-primary flex-[2]">Generate</button>
            </div>
            <button onclick="clearCurrentForm()" class="btn btn-ghost-red w-full uppercase">Wipe All Current Entries</button>
        </nav>

        <footer class="p-8 border-t dark:border-slate-800 space-y-8 bg-slate-50 dark:bg-slate-900/40">
            <div class="flex justify-center gap-4 text-[10px] font-black uppercase text-blue-600 dark:text-blue-400">
                <button onclick="setView('home')">Home</button>
                <button onclick="setView('about')">About</button>
                <button onclick="setView('disclaimer')">Legal</button>
            </div>
            <div class="space-y-1">
                <p class="text-[9px] font-bold text-slate-400 text-center uppercase tracking-widest">
                    Created by L/Cpl. R. Marshall - Portland Division
                </p>
            </div>
        </footer>
    </div>

    <script>
        let state = {
            theme: 'light', view: 'home', mode: null, incidentType: 'house_fire', formData: {}, report: null
        };

        const CHECKS = ["Occurrence Book Checked", "Telephone Book Checked", "Unit Checked", "Equipment Checked", "Checklist Signed", "Forecast Done", "Status Book Written Up", "Status Book Signed"];

        const darkQuery = window.matchMedia('(prefers-color-scheme: dark)');
        function updateTheme(isDark) {
            state.theme = isDark ? 'dark' : 'light';
            document.documentElement.className = state.theme;
            document.body.className = state.theme;
            document.getElementById('themeIcon').innerText = state.theme === 'light' ? '🌙' : '☀️';
        }
        updateTheme(darkQuery.matches);
        darkQuery.addEventListener('change', e => updateTheme(e.matches));
        function toggleThemeManual() { updateTheme(state.theme === 'light'); }

        function setView(v, mode = null) {
            saveInputs();
            state.view = v;
            if (mode) state.mode = mode;
            render();
        }

        function saveInputs() {
            document.querySelectorAll('input, textarea, select').forEach(i => {
                if (i.id) state.formData[i.id.replace('f_', '')] = i.value;
            });
        }

        function render() {
            const body = document.getElementById('appBody');
            const nav = document.getElementById('bottomNav');
            const label = document.getElementById('viewLabel');
            body.innerHTML = '';
            nav.classList.add('hidden');
            label.innerText = state.mode ? state.mode.toUpperCase() : 'JFB WORKSTATION';

            if (state.view === 'home') {
                renderHome(body);
            } else if (state.view === 'input') {
                nav.classList.remove('hidden');
                renderInput(body);
                document.getElementById('actionBtn').onclick = handleGenerate;
                document.getElementById('actionBtn').innerText = 'Process Report';
            } else if (state.view === 'result') {
                nav.classList.remove('hidden');
                renderResult(body);
                document.getElementById('actionBtn').onclick = copyReport;
                document.getElementById('actionBtn').innerText = 'Copy Full Report';
            } else if (state.view === 'about' || state.view === 'disclaimer') {
                renderTextPage(body, state.view);
            }
            window.scrollTo(0,0);
        }

        function renderHome(container) {
            const menus = [
                { id: 'incident', title: 'Incident Report', icon: '📄', desc: 'Narrative & Administration' },
                { id: 'handover', title: 'Shift Handover', icon: '🔄', desc: 'Watch Accountability' },
                { id: 'debriefing', title: 'Debriefing', icon: '📝', desc: 'Operational Review' }
            ];
            container.innerHTML = `<div class="grid gap-4 pt-2">
                ${menus.map(m => `
                    <button onclick="setView('input', '${m.id}')" class="card p-6 flex items-center gap-5 text-left border-2 border-transparent hover:border-blue-500 active:scale-95 shadow-sm">
                        <span class="text-4xl">${m.icon}</span>
                        <div>
                            <h3 class="font-extrabold text-lg leading-tight text-slate-900 dark:text-white">${m.title}</h3>
                            <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">${m.desc}</p>
                        </div>
                    </button>
                `).join('')}
            </div>`;
        }

        function renderInput(container) {
            const fd = state.formData;
            const commonHeader = `
                <div class="grid grid-cols-2 gap-3">
                    <div><label>Watch</label><select id="f_watch"><option value="">Select</option>
                        <option value="A" ${fd.watch==='A'?'selected':''}>Watch A</option><option value="B" ${fd.watch==='B'?'selected':''}>Watch B</option>
                        <option value="C" ${fd.watch==='C'?'selected':''}>Watch C</option><option value="D" ${fd.watch==='D'?'selected':''}>Watch D</option>
                    </select></div>
                    <div><label>District Officer</label><input type="text" id="f_districtOfficer" placeholder="OIC" value="${fd.districtOfficer || ''}"></div>
                </div>`;

            if (state.mode === 'incident') {
                container.innerHTML = `
                <div class="space-y-6">
                    ${commonHeader}
                    <div><label>Classification</label><select id="f_incidentType" onchange="saveInputs(); state.incidentType=this.value; render();">
                        <option value="house_fire" ${state.incidentType==='house_fire'?'selected':''}>House Fire</option>
                        <option value="mv_fire" ${state.incidentType==='mv_fire'?'selected':''}>Motor Vehicle Fire</option>
                        <option value="bush_rubbish_electrical" ${state.incidentType==='bush_rubbish_electrical'?'selected':''}>Bush / Rubbish / Electrical</option>
                        <option value="mva" ${state.incidentType==='mva'?'selected':''}>MVA</option>
                        <option value="false_alarm" ${state.incidentType==='false_alarm'?'selected':''}>False Alarm</option>
                        <option value="special_service" ${state.incidentType==='special_service'?'selected':''}>Special Service</option>
                    </select></div>

                    <div class="card p-5 space-y-4 shadow-sm">
                        <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest">Response Details</p>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label>Date of Call</label><input type="date" id="f_dateCall" value="${fd.dateCall || ''}"></div>
                            <div><label>Time of Call</label><input type="time" id="f_timeCall" value="${fd.timeCall || ''}"></div>
                        </div>
                        <div><label>Responding Station</label><input type="text" id="f_respondingStation" value="${fd.respondingStation || ''}"></div>
                        <div><label>How Called</label><select id="f_howCalled"><option value="">Select</option>
                            <option value="Telephone" ${fd.howCalled==='Telephone'?'selected':''}>Telephone</option>
                            <option value="Verbal" ${fd.howCalled==='Verbal'?'selected':''}>Verbal</option></select></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label>Time Leaving</label><input type="time" id="f_timeLeaving" value="${fd.timeLeaving || ''}"></div>
                            <div><label>Time Return</label><input type="time" id="f_timeReturn" value="${fd.timeReturn || ''}"></div>
                        </div>
                    </div>

                    <div class="card p-5 space-y-4 shadow-sm">
                        <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest">Location & Risk</p>
                        <div><label>Address</label><input type="text" id="f_loc" value="${fd.loc || ''}"></div>
                        <div><label>Type of Premises</label><input type="text" id="f_typePremises" value="${fd.typePremises || ''}"></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label>Distance (km)</label><input type="text" id="f_distance" value="${fd.distance || ''}"></div>
                            <div><label>No. of Men</label><input type="number" id="f_menPresent" value="${fd.menPresent || ''}"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label>Est Risk</label><input type="text" id="f_estRisk" value="${fd.estRisk || ''}"></div>
                            <div><label>Est Loss</label><input type="text" id="f_estLoss" value="${fd.estLoss || ''}"></div>
                        </div>
                    </div>

                    <div class="card p-5 space-y-4 shadow-sm">
                        <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest">Parties & Origin</p>
                        <div><label>Owner Name</label><input type="text" id="f_owner" value="${fd.owner || ''}"></div>
                        <div><label>Occupier Name</label><input type="text" id="f_occupier" value="${fd.occupier || ''}"></div>
                        <div><label>Supposed Origin</label><input type="text" id="f_supposedOrigin" value="${fd.supposedOrigin || ''}"></div>
                    </div>

                    <div class="space-y-4">
                        <div><label>Unit# / Apparatus</label><input type="text" id="f_unit" placeholder="unit#" value="${fd.unit || ''}"></div>
                        <div><label>Operational Narrative</label><textarea id="f_notes" rows="6" placeholder="Describe actions taken here...">${fd.notes || ''}</textarea></div>
                    </div>
                </div>`;
            } else if (state.mode === 'handover') {
                container.innerHTML = `<div class="space-y-6">${commonHeader}<div class="card p-5 space-y-3 shadow-sm">
                    <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest mb-2">Checklist</p>
                    ${CHECKS.map(c => {
                        const saved = fd[`check_${c.replace(/ /g,'_')}`] || 'not_stated';
                        return `<div class="flex justify-between items-center text-sm border-b pb-2 dark:border-slate-700"><span>${c}</span><select class="sh-check w-20 font-bold text-blue-600 bg-transparent" id="f_check_${c.replace(/ /g,'_')}" data-label="${c}"><option value="not_stated" ${saved==='not_stated'?'selected':''}>?</option><option value="yes" ${saved==='yes'?'selected':''}>YES</option><option value="no" ${saved==='no'?'selected':''}>NO</option></select></div>`;
                    }).join('')}
                </div><textarea id="f_summary" rows="6" placeholder="Shift summary...">${fd.summary || ''}</textarea></div>`;
            } else {
                container.innerHTML = `<div class="space-y-4">${commonHeader}<div><label>Debrief Notes</label><textarea id="f_notes" rows="12" placeholder="Review points...">${fd.notes || ''}</textarea></div></div>`;
            }
        }

        async function handleGenerate() {
            saveInputs();
            if (state.mode === 'incident' && !state.formData.loc) return alert("Location is required.");
            const body = document.getElementById('appBody');
            body.innerHTML = `<div class="flex flex-col items-center py-20 gap-4"><div class="spinner"></div><p class="text-xs font-black uppercase tracking-widest text-slate-400 text-center">Processing operational data...</p></div>`;
            
            setTimeout(() => {
                const d = state.formData;
                const r = { narrative: d.notes || d.summary || "No notes recorded.", admin: {}, checks: [], timestamp: new Date().toLocaleString('en-JM', { dateStyle: 'medium', timeStyle: 'short' }) };

                if (state.mode === 'incident') {
                    r.admin = { 
                        "Classification": state.incidentType.replace(/_/g, ' ').toUpperCase(), "Watch": d.watch || "Not Entered", "DO": d.districtOfficer || "Not Entered",
                        "Station": d.respondingStation || "Not Entered", "Date of Call": d.dateCall || "Not Entered", "Time of Call": d.timeCall || "Not Entered",
                        "How Called": d.howCalled || "Not Entered", "Time Leaving": d.timeLeaving || "Not Entered", "Time Return": d.timeReturn || "Not Entered",
                        "Location": d.loc || "Not Entered", "Type of Premises": d.typePremises || "Not Entered", "Distance": d.distance ? d.distance + ' km' : "Not Entered",
                        "Men Present": d.menPresent || "Not Entered", "Est Risk": d.estRisk || "Not Entered", "Est Loss": d.estLoss || "Not Entered",
                        "Owner": d.owner || "Not Entered", "Occupier": d.occupier || "Not Entered", "Supposed Origin": d.supposedOrigin || "Not Entered", "Unit#": d.unit || "Not Entered"
                    };
                } else if (state.mode === 'handover') {
                    CHECKS.forEach(c => { const val = d[`check_${c.replace(/ /g,'_')}`]; r.checks.push({ label: c, status: val === 'yes' ? '✅ DONE' : (val === 'no' ? '❌ NO' : '⚠️ ?') }); });
                    r.admin = { "Watch": d.watch || "Not Entered", "District Officer": d.districtOfficer || "Not Entered" };
                } else {
                    r.admin = { "Watch": d.watch || "Not Entered", "District Officer": d.districtOfficer || "Not Entered" };
                }

                state.report = r;
                state.view = 'result';
                render();
            }, 600);
        }

        function renderResult(container) {
            const r = state.report;
            container.innerHTML = `
                <div class="space-y-4 pb-8 animate-in fade-in duration-300">
                    <div class="card p-6 report-accent shadow-sm">
                        <label>Narrative</label>
                        <p class="text-sm leading-relaxed whitespace-pre-wrap text-slate-900 dark:text-slate-100 font-medium">${r.narrative}</p>
                    </div>
                    <div class="card p-5 space-y-2 shadow-sm">
                        <label>Administration</label>
                        ${Object.entries(r.admin).map(([k,v]) => `<div class="flex justify-between text-xs border-b pb-1 dark:border-slate-700"><span>${k}</span><span class="font-bold text-right ml-4">${v}</span></div>`).join('')}
                    </div>
                    ${r.checks.length ? `<div class="card p-5 space-y-2 shadow-sm"><label>Checks Summary</label>${r.checks.map(c => `<div class="flex justify-between text-xs border-b pb-1 dark:border-slate-700"><span>${c.label}</span><span class="font-bold">${c.status}</span></div>`).join('')}</div>` : ''}
                    <button onclick="state.view='input';render();" class="btn btn-secondary w-full">Edit Details</button>
                </div>`;
        }

        function renderTextPage(container, type) {
            const h = type === 'about' ? "About StationBrain" : "Legal Disclaimer";
            const p = type === 'about' ? "Developed by L/Cpl. R. Marshall to assist with operational reporting and station handovers under time pressure. Logic reflects station practice based on real JFB operations." : "Unofficial support tool only. Does not replace official JFB SOPs or doctrine. Reports must be reviewed and approved by the OIC.";
            container.innerHTML = `<div class="card p-8 space-y-4 shadow-sm"><h2 class="font-black text-xl text-blue-600 dark:text-blue-400">${h}</h2><p class="text-sm leading-relaxed">${p}</p><button onclick="setView('home')" class="btn btn-secondary w-full">Back</button></div>`;
        }

        function goHome() {
            if (state.view !== 'result' && Object.keys(state.formData).length > 0) {
                if(!confirm("Return to menu? Current entries will be lost.")) return;
            }
            state.formData = {}; state.mode = null; state.view = 'home'; render();
        }

        function clearCurrentForm() { if (confirm("Clear all entries?")) { state.formData = {}; render(); } }

        async function copyReport() {
            const r = state.report;
            const checks = r.checks.length ? `\n\nCHECKS:\n` + r.checks.map(c => `${c.label}: ${c.status}`).join('\n') : '';
            const text = `REPORT: ${state.mode.toUpperCase()}\n\nADMIN:\n${Object.entries(r.admin).map(([k,v]) => `${k}: ${v}`).join('\n')}\n\nNARRATIVE:\n${r.narrative}${checks}\n\nGenerated via StationBrain`;
            await navigator.clipboard.writeText(text); alert("Report copied.");
        }

        render();
    </script>
</body>
</html>
