<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StationBrain | JFB Operational Workstation</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="StationBrain">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-label: #1e40af;
            --border-color: #cbd5e1;
            --accent-blue: #2563eb;
            --accent-green: #059669;
            --accent-red: #dc2626;
            --focus-ring: rgba(37, 99, 235, 0.15);
        }
        .dark {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-label: #7dd3fc;
            --border-color: #334155;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
        }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            transition: background-color 0.3s;
            margin: 0;
        }
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            transition: background-color 0.3s, border-color 0.3s;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-label);
            margin-bottom: 0.4rem;
            padding-left: 0.1rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 0.75rem;
            border: 2px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            font-weight: 500;
            box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            transition: all 0.2s;
            border: 2.5px solid transparent;
            cursor: pointer;
        }
        .btn-primary {
            background-color: var(--accent-blue);
            color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-secondary {
            background-color: var(--bg-card);
            border-color: var(--text-main);
            color: var(--text-main);
            border: 2.2px solid;
        }
        .btn-ghost-red {
            color: var(--accent-red);
            font-size: 0.75rem;
            font-weight: 800;
            text-decoration: underline;
            background: transparent;
        }
        .report-accent { border-left: 6px solid var(--accent-blue); }
        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border-left-color: var(--accent-blue);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .log-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .log-body.open { max-height: 2000px; }
        .log-chevron {
            transition: transform 0.3s ease;
            display: inline-block;
        }
        .log-chevron.open { transform: rotate(180deg); }
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.35rem;
            height: 1.35rem;
            padding: 0 0.3rem;
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 900;
            background-color: var(--accent-blue);
            color: #fff;
        }
    </style>
</head>
<body class="light">
    <div class="max-w-md mx-auto flex flex-col min-h-screen relative shadow-2xl bg-inherit no-scrollbar">
        <header class="p-4 flex justify-between items-center sticky top-0 z-50 card border-b rounded-none shadow-sm">
            <div>
                <h1 class="font-extrabold text-xl tracking-tight text-slate-900 dark:text-white">StationBrain</h1>
                <p id="viewLabel" class="text-[10px] uppercase tracking-widest font-black text-blue-600 dark:text-blue-400">JFB Workstation</p>
            </div>
            <button onclick="toggleThemeManual()" class="p-2 rounded-full bg-slate-200 dark:bg-slate-800 text-lg" id="themeIcon">🌙</button>
        </header>
        <main id="appBody" class="flex-1 p-4 space-y-6"></main>
        <nav id="bottomNav" class="p-4 card border-t rounded-none space-y-4 hidden sticky bottom-0 z-40 bg-inherit shadow-2xl">
            <div class="flex gap-2">
                <button onclick="goHome()" class="btn btn-secondary flex-1">Menu</button>
                <button id="actionBtn" class="btn btn-primary flex-[2]">Generate</button>
            </div>
            <button onclick="clearCurrentForm()" class="btn btn-ghost-red w-full uppercase">Wipe Current Entries</button>
        </nav>
        <footer class="p-8 border-t dark:border-slate-800 space-y-8 bg-slate-50 dark:bg-slate-900/40">
            <div class="flex justify-center gap-4 text-[10px] font-black uppercase text-blue-600 dark:text-blue-400">
                <button onclick="goHome()">Home</button>
                <button onclick="setView('about')">About</button>
                <button onclick="setView('disclaimer')">Legal</button>
            </div>
            <p class="text-[9px] font-bold text-slate-400 text-center uppercase tracking-widest">
                Created by L/Cpl. R. Marshall - Portland Division
            </p>
        </footer>
    </div>
    <script>
        let state = {
            theme: 'light',
            view: 'home',
            mode: null,
            incidentType: 'house_fire',
            formData: {},
            report: null
        };
        const CHECKS = [
            "Occurrence Book Checked",
            "Telephone Book Checked",
            "Unit Checked",
            "Equipment Checked",
            "Checklist Signed",
            "Forecast Done",
            "Status Book Written Up",
            "Status Book Signed"
        ];
        function formatReportText({ mode, timestamp, admin = {}, narrative = '', checks = [] }) {
            const lines = [];
            lines.push('STATIONBRAIN REPORT');
            lines.push('----------------------------------------');
            lines.push(`REPORT TYPE: ${String(mode || '').toUpperCase()}`);
            if (timestamp) lines.push(`GENERATED: ${timestamp}`);
            lines.push('');
            lines.push('ADMINISTRATION');
            lines.push('----------------------------------------');
            const adminEntries = Object.entries(admin || {});
            if (adminEntries.length) {
                adminEntries.forEach(([k, v]) => lines.push(`${k}: ${v}`));
            } else {
                lines.push('No administration details entered.');
            }
            lines.push('');
            lines.push('NARRATIVE');
            lines.push('----------------------------------------');
            lines.push(narrative || 'No notes recorded.');
            if (checks && checks.length) {
                lines.push('');
                lines.push('CHECKS');
                lines.push('----------------------------------------');
                checks.forEach(c => lines.push(`${c.label}: ${c.status}`));
            }
            lines.push('');
            lines.push('Generated via StationBrain');
            return lines.join('\n');
        }
        const LOG_KEY = 'stationbrain_log';
        function loadLog() {
            try {
                return JSON.parse(localStorage.getItem(LOG_KEY)) || [];
            } catch {
                return [];
            }
        }
        function saveLog(log) {
            try {
                localStorage.setItem(LOG_KEY, JSON.stringify(log));
            } catch {
                console.warn('Could not save log.');
            }
        }
        function appendToLog(report, mode) {
            const log = loadLog();
            log.unshift({ id: Date.now(), mode, ...report });
            saveLog(log);
        }
        function deleteLogEntry(id) {
            if (!confirm("Delete this report from the log?")) return;
            saveLog(loadLog().filter(r => r.id !== id));
            renderLog(document.getElementById('appBody'));
        }
        function clearLog() {
            if (!confirm("Clear ALL saved reports? This cannot be undone.")) return;
            saveLog([]);
            renderLog(document.getElementById('appBody'));
        }
        function toggleLogEntry(id) {
            const body = document.getElementById(`log-body-${id}`);
            const chev = document.getElementById(`log-chev-${id}`);
            if (!body || !chev) return;
            body.classList.toggle('open');
            chev.classList.toggle('open');
        }

        async function copyLogReport(id) {
            const entry = loadLog().find(r => r.id === id);
            if (!entry) return;
            const text = formatReportText({
                mode: entry.mode,
                timestamp: entry.timestamp || 'Not Entered',
                admin: entry.admin || {},
                narrative: entry.narrative || 'No notes recorded.',
                checks: entry.checks || []
            });
            try {
                await navigator.clipboard.writeText(text);
                alert("Report copied.");
            } catch {
                alert("Copy failed. Please copy manually.");
            }
        }
        const darkQuery = window.matchMedia('(prefers-color-scheme: dark)');
        function updateTheme(isDark) {
            state.theme = isDark ? 'dark' : 'light';
            document.documentElement.className = state.theme;
            document.body.className = state.theme;
            const themeIcon = document.getElementById('themeIcon');
            if (themeIcon) themeIcon.innerText = state.theme === 'light' ? '🌙' : '☀️';
        }
        updateTheme(darkQuery.matches);
        if (typeof darkQuery.addEventListener === 'function') {
            darkQuery.addEventListener('change', e => updateTheme(e.matches));
        } else if (typeof darkQuery.addListener === 'function') {
            darkQuery.addListener(e => updateTheme(e.matches));
        }
        function toggleThemeManual() {
            updateTheme(state.theme !== 'dark');
        }
        function saveInputs() {
            document.querySelectorAll('input, textarea, select').forEach(i => {
                if (i.id) {
                    state.formData[i.id.replace('f_', '')] = i.value;
                }
            });
        }
        function setView(v, mode = null) {
            saveInputs();
            state.view = v;
            if (mode) state.mode = mode;
            render();
        }
        function goHome() {
            if ((state.view === 'input' || state.view === 'result' || state.view === 'log') &&
                (Object.keys(state.formData).length > 0 || state.report)) {
                if (!confirm("Return to menu? Current entries may be lost.")) return;
            }
            state.formData = {};
            state.report = null;
            state.mode = null;
            state.view = 'home';
            render();
        }
        function clearCurrentForm() {
            if (!confirm("Clear all entries?")) return;
            state.formData = {};
            state.report = null;
            if (state.view === 'result') {
                state.view = 'input';
            }
            render();
        }
        function render() {
            const body = document.getElementById('appBody');
            const nav = document.getElementById('bottomNav');
            const label = document.getElementById('viewLabel');
            body.innerHTML = '';
            nav.classList.add('hidden');
            label.innerText = state.mode ? state.mode.toUpperCase() : 'JFB WORKSTATION';
            if (state.view === 'home') {
                renderHome(body);
            } else if (state.view === 'log') {
                renderLog(body);
            } else if (state.view === 'input') {
                nav.classList.remove('hidden');
                renderInput(body);
                document.getElementById('actionBtn').onclick = handleGenerate;
                document.getElementById('actionBtn').innerText = 'Process Report';
            } else if (state.view === 'result') {
                nav.classList.remove('hidden');
                renderResult(body);
                document.getElementById('actionBtn').onclick = copyReport;
                document.getElementById('actionBtn').innerText = 'Copy Full Report';
            } else if (state.view === 'about' || state.view === 'disclaimer') {
                renderTextPage(body, state.view);
            }
            window.scrollTo(0, 0);
        }
        function renderHome(container) {
            const logCount = loadLog().length;
            const menus = [
                { id: 'incident', title: 'Incident Report', icon: '📄', desc: 'Narrative & Administration' },
                { id: 'handover', title: 'Shift Handover', icon: '🔄', desc: 'Watch Accountability' },
                { id: 'debriefing', title: 'Debriefing', icon: '📝', desc: 'Operational Review' }
            ];
            container.innerHTML = `<div class="grid gap-4 pt-2">
                ${menus.map(m => `
                    <button onclick="setView('input', '${m.id}')" class="card p-6 flex items-center gap-5 text-left border-2 border-transparent hover:border-blue-500 active:scale-95 shadow-sm">
                        <span class="text-4xl">${m.icon}</span>
                        <div>
                            <h3 class="font-extrabold text-lg leading-tight text-slate-900 dark:text-white">${m.title}</h3>
                            <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">${m.desc}</p>
                        </div>
                    </button>
                `).join('')}
                <button onclick="setView('log')" class="card p-6 flex items-center gap-5 text-left border-2 border-transparent hover:border-blue-500 active:scale-95 shadow-sm">
                    <span class="text-4xl">🗂️</span>
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-extrabold text-lg leading-tight text-slate-900 dark:text-white">Reports Log</h3>
                            ${logCount > 0 ? `<span class="badge">${logCount}</span>` : ''}
                        </div>
                        <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Saved Report History</p>
                    </div>
                </button>
            </div>`;
        }
        function renderInput(container) {
            const fd = state.formData;
            const commonHeader = `
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label>Watch</label>
                        <select id="f_watch" onchange="saveInputs()">
                            <option value="">Select</option>
                            <option value="A" ${fd.watch === 'A' ? 'selected' : ''}>Watch A</option>
                            <option value="B" ${fd.watch === 'B' ? 'selected' : ''}>Watch B</option>
                            <option value="C" ${fd.watch === 'C' ? 'selected' : ''}>Watch C</option>
                            <option value="D" ${fd.watch === 'D' ? 'selected' : ''}>Watch D</option>
                        </select>
                    </div>
                    <div>
                        <label>District Officer</label>
                        <input type="text" id="f_districtOfficer" placeholder="OIC" value="${fd.districtOfficer || ''}">
                    </div>
                </div>`;
            if (state.mode === 'incident') {
                container.innerHTML = `
                <div class="space-y-6">
                    ${commonHeader}
                    <div>
                        <label>Incident Classification</label>
                        <select id="f_incidentType" onchange="saveInputs(); state.incidentType=this.value; render();">
                            <option value="house_fire" ${state.incidentType === 'house_fire' ? 'selected' : ''}>House Fire</option>
                            <option value="mv_fire" ${state.incidentType === 'mv_fire' ? 'selected' : ''}>Motor Vehicle Fire</option>
                            <option value="bush_rubbish_electrical" ${state.incidentType === 'bush_rubbish_electrical' ? 'selected' : ''}>Bush / Rubbish / Electrical</option>
                            <option value="mva" ${state.incidentType === 'mva' ? 'selected' : ''}>MVA</option>
                            <option value="false_alarm" ${state.incidentType === 'false_alarm' ? 'selected' : ''}>False Alarm</option>
                            <option value="special_service" ${state.incidentType === 'special_service' ? 'selected' : ''}>Special Service</option>
                        </select>
                    </div>
                    <div class="card p-5 space-y-4 shadow-sm">
                        <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest">Response Details</p>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label>Date of Call</label>
                                <input type="date" id="f_dateCall" value="${fd.dateCall || ''}">
                            </div>
                            <div>
                                <label>Time of Call</label>
                                <input type="time" id="f_timeCall" value="${fd.timeCall || ''}">
                            </div>
                        </div>
                        <div>
                            <label>Responding Station</label>
                            <input type="text" id="f_respondingStation" value="${fd.respondingStation || ''}">
                        </div>
                        <div>
                            <label>How Called</label>
                            <select id="f_howCalled" onchange="saveInputs()">
                                <option value="">Select</option>
                                <option value="Telephone" ${fd.howCalled === 'Telephone' ? 'selected' : ''}>Telephone</option>
                                <option value="Verbal" ${fd.howCalled === 'Verbal' ? 'selected' : ''}>Verbal</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label>Time Leaving</label>
                                <input type="time" id="f_timeLeaving" value="${fd.timeLeaving || ''}">
                            </div>
                            <div>
                                <label>Time Return</label>
                                <input type="time" id="f_timeReturn" value="${fd.timeReturn || ''}">
                            </div>
                        </div>
                    </div>
                    <div class="card p-5 space-y-4 shadow-sm">
                        <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest">Location & Risk</p>
                        <div>
                            <label>Address</label>
                            <input type="text" id="f_loc" value="${fd.loc || ''}">
                        </div>
                        <div>
                            <label>Type of Premises</label>
                            <input type="text" id="f_typePremises" value="${fd.typePremises || ''}">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label>Distance (km)</label>
                                <input type="text" id="f_distance" value="${fd.distance || ''}">
                            </div>
                            <div>
                                <label>No. of Men</label>
                                <input type="number" id="f_menPresent" value="${fd.menPresent || ''}">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label>Est Risk</label>
                                <input type="text" id="f_estRisk" value="${fd.estRisk || ''}">
                            </div>
                            <div>
                                <label>Est Loss</label>
                                <input type="text" id="f_estLoss" value="${fd.estLoss || ''}">
                            </div>
                        </div>
                    </div>
                    <div class="card p-5 space-y-4 shadow-sm">
                        <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest">Parties & Origin</p>
                        <div>
                            <label>Owner Name</label>
                            <input type="text" id="f_owner" value="${fd.owner || ''}">
                        </div>
                        <div>
                            <label>Occupier Name</label>
                            <input type="text" id="f_occupier" value="${fd.occupier || ''}">
                        </div>
                        <div>
                            <label>Supposed Origin</label>
                            <input type="text" id="f_supposedOrigin" value="${fd.supposedOrigin || ''}">
                        </div>
                    </div>
                    ${state.incidentType === 'house_fire' ? `
                    <div class="card p-5 space-y-4 shadow-sm">
                        <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest">House Fire Details</p>
                        <div>
                            <label>Number of Occupants</label>
                            <input type="number" min="0" id="f_occupants" value="${fd.occupants || ''}">
                        </div>
                        <div>
                            <label>Insured</label>
                            <select id="f_insured" onchange="saveInputs()">
                                <option value="">Select</option>
                                <option value="yes" ${fd.insured === 'yes' ? 'selected' : ''}>Yes</option>
                                <option value="no" ${fd.insured === 'no' ? 'selected' : ''}>No</option>
                            </select>
                        </div>
                    </div>` : ''}
                    ${(state.incidentType === 'mv_fire' || state.incidentType === 'mva') ? `
                    <div class="card p-5 space-y-4 shadow-sm">
                        <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest">Vehicle Details</p>
                        <div>
                            <label>License Plate Number</label>
                            <input type="text" id="f_licensePlate" value="${fd.licensePlate || ''}">
                        </div>
                        <div>
                            <label>Number of Vehicles Involved</label>
                            <input type="number" min="0" id="f_vehicleCount" value="${fd.vehicleCount || ''}">
                        </div>
                    </div>` : ''}
                    <div class="space-y-4">
                        <div>
                            <label>Unit# / Apparatus</label>
                            <input type="text" id="f_unit" placeholder="unit#" value="${fd.unit || ''}">
                        </div>
                        <div>
                            <label>Operational Narrative</label>
                            <textarea id="f_notes" rows="6" placeholder="Describe actions taken here...">${fd.notes || ''}</textarea>
                        </div>
                    </div>
                </div>`;
            } else if (state.mode === 'handover') {
                container.innerHTML = `<div class="space-y-6">${commonHeader}<div class="card p-5 space-y-3 shadow-sm">
                    <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest mb-2">Checklist</p>
                    ${CHECKS.map(c => {
                        const key = `check_${c.replace(/ /g, '_')}`;
                        const saved = fd[key] || 'not_stated';
                        return `<div class="flex justify-between items-center text-sm border-b pb-2 dark:border-slate-700">
                            <span>${c}</span>
                            <select class="sh-check w-20 font-bold text-blue-600 bg-transparent" id="f_${key}" onchange="saveInputs()" data-label="${c}">
                                <option value="not_stated" ${saved === 'not_stated' ? 'selected' : ''}>?</option>
                                <option value="yes" ${saved === 'yes' ? 'selected' : ''}>YES</option>
                                <option value="no" ${saved === 'no' ? 'selected' : ''}>NO</option>
                            </select>
                        </div>`;
                    }).join('')}
                </div><textarea id="f_summary" rows="6" placeholder="Shift summary...">${fd.summary || ''}</textarea></div>`;
            } else {
                container.innerHTML = `<div class="space-y-4">${commonHeader}<div><label>Debrief Notes</label><textarea id="f_notes" rows="12" placeholder="Review points...">${fd.notes || ''}</textarea></div></div>`;
            }
        }
        async function handleGenerate() {
            saveInputs();
            if (!state.mode) {
                alert("Please choose a report type first.");
                return;
            }
            if (state.mode === 'incident') {
                if (!state.formData.loc) return alert("Location is required.");
                if (!state.formData.timeCall) return alert("Time of call is required.");
                if (!state.formData.respondingStation) return alert("Responding station is required.");
            }
            const body = document.getElementById('appBody');
            body.innerHTML = `<div class="flex flex-col items-center py-20 gap-4"><div class="spinner"></div><p class="text-xs font-black uppercase tracking-widest text-slate-400 text-center">Processing operational data...</p></div>`;
            setTimeout(() => {
                const d = state.formData;
                const r = {
                    narrative: d.notes || d.summary || "No notes recorded.",
                    admin: {},
                    checks: [],
                    timestamp: new Date().toLocaleString('en-JM', { dateStyle: 'medium', timeStyle: 'short' })
                };
                if (state.mode === 'incident') {
                    r.admin = {
                        "Classification": state.incidentType.replace(/_/g, ' ').toUpperCase(),
                        "Watch": d.watch || "Not Entered",
                        "DO": d.districtOfficer || "Not Entered",
                        "Station": d.respondingStation || "Not Entered",
                        "Date of Call": d.dateCall || "Not Entered",
                        "Time of Call": d.timeCall || "Not Entered",
                        "How Called": d.howCalled || "Not Entered",
                        "Time Leaving": d.timeLeaving || "Not Entered",
                        "Time Return": d.timeReturn || "Not Entered",
                        "Location": d.loc || "Not Entered",
                        "Type of Premises": d.typePremises || "Not Entered",
                        "Distance": d.distance ? d.distance + ' km' : "Not Entered",
                        "No. of Men": d.menPresent || "Not Entered",
                        "Est Risk": d.estRisk || "Not Entered",
                        "Est Loss": d.estLoss || "Not Entered",
                        "Owner": d.owner || "Not Entered",
                        "Occupier": d.occupier || "Not Entered",
                        "Origin": d.supposedOrigin || "Not Entered",
                        ...(state.incidentType === 'house_fire' ? {
                            "Number of Occupants": d.occupants || "Not Entered",
                            "Insured": d.insured ? (d.insured === 'yes' ? 'Yes' : 'No') : "Not Entered"
                        } : {}),
                        ...((state.incidentType === 'mv_fire' || state.incidentType === 'mva') ? {
                            "License Plate Number": d.licensePlate || "Not Entered",
                            "No. of Vehicles Involved": d.vehicleCount || "Not Entered"
                        } : {}),
                        "Unit#": d.unit || "Not Entered"
                    };
                } else if (state.mode === 'handover') {
                    CHECKS.forEach(c => {
                        const key = `check_${c.replace(/ /g, '_')}`;
                        const val = d[key];
                        r.checks.push({
                            label: c,
                            status: val === 'yes' ? '✅ DONE' : (val === 'no' ? '❌ NO' : '⚠️ ?')
                        });
                    });
                    r.admin = {
                        "Watch": d.watch || "Not Entered",
                        "District Officer": d.districtOfficer || "Not Entered"
                    };
                } else {
                    r.admin = {
                        "Watch": d.watch || "Not Entered",
                        "District Officer": d.districtOfficer || "Not Entered"
                    };
                }
                state.report = r;
                appendToLog(r, state.mode);
                state.view = 'result';
                render();
            }, 600);
        }
        function renderResult(container) {
            const r = state.report || { narrative: 'No report available.', admin: {}, checks: [] };
            container.innerHTML = `
                <div class="space-y-4 pb-8 animate-in fade-in duration-300">
                    <div class="card p-6 report-accent shadow-sm">
                        <label>Narrative</label>
                        <p class="text-sm leading-relaxed whitespace-pre-wrap text-slate-900 dark:text-slate-100 font-medium">${r.narrative}</p>
                    </div>
                    <div class="card p-5 space-y-2 shadow-sm">
                        <label>Administration</label>
                        ${Object.entries(r.admin).map(([k, v]) => `<div class="flex justify-between text-xs border-b pb-1 dark:border-slate-700"><span>${k}</span><span class="font-bold text-right ml-4">${v}</span></div>`).join('')}
                    </div>
                    ${r.checks.length ? `<div class="card p-5 space-y-2 shadow-sm"><label>Checks Summary</label>${r.checks.map(c => `<div class="flex justify-between text-xs border-b pb-1 dark:border-slate-700"><span>${c.label}</span><span class="font-bold">${c.status}</span></div>`).join('')}</div>` : ''}
                    <button onclick="state.view='input';render();" class="btn btn-secondary w-full">Edit Details</button>
                </div>`;
        }
        function renderLog(container) {
            document.getElementById('viewLabel').innerText = 'REPORTS LOG';
            const log = loadLog();
            const modeIcon = { incident: '📄', handover: '🔄', debriefing: '📝' };
            const modeLabel = { incident: 'Incident Report', handover: 'Shift Handover', debriefing: 'Debriefing' };
            if (log.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center py-20 gap-4 text-center">
                        <span class="text-5xl">🗂️</span>
                        <p class="font-black text-slate-400 uppercase tracking-widest text-xs">No saved reports yet</p>
                        <p class="text-xs text-slate-400">Reports are saved automatically each time you process one.</p>
                        <button onclick="goHome()" class="btn btn-secondary mt-4">Back to Menu</button>
                    </div>`;
                return;
            }
            container.innerHTML = `
                <div class="space-y-3 pb-8">
                    <div class="flex justify-between items-center px-1">
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">${log.length} report${log.length !== 1 ? 's' : ''} saved</p>
                        <button onclick="clearLog()" class="btn-ghost-red text-[10px]">Clear All</button>
                    </div>
                    ${log.map(entry => {
                        const icon = modeIcon[entry.mode] || '📄';
                        const label = modeLabel[entry.mode] || String(entry.mode || '').toUpperCase();
                        const preview = entry.admin && entry.admin['Location'] && entry.admin['Location'] !== 'Not Entered'
                            ? entry.admin['Location']
                            : (entry.admin && entry.admin['Watch'] && entry.admin['Watch'] !== 'Not Entered'
                                ? 'Watch ' + entry.admin['Watch']
                                : 'No location');
                        const checksHtml = entry.checks && entry.checks.length
                            ? `<div class="mt-3 pt-3 border-t dark:border-slate-700 space-y-1">
                                <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest mb-2">Checks</p>
                                ${entry.checks.map(c => `<div class="flex justify-between text-xs border-b pb-1 dark:border-slate-700"><span>${c.label}</span><span class="font-bold">${c.status}</span></div>`).join('')}
                               </div>`
                            : '';
                        return `
                        <div class="card shadow-sm overflow-hidden">
                            <button onclick="toggleLogEntry(${entry.id})" class="w-full p-4 flex items-center gap-4 text-left">
                                <span class="text-2xl flex-shrink-0">${icon}</span>
                                <div class="flex-1 min-w-0">
                                    <p class="font-extrabold text-sm text-slate-900 dark:text-white truncate">${label}</p>
                                    <p class="text-[10px] text-slate-400 font-semibold truncate">${preview}</p>
                                    <p class="text-[9px] text-slate-300 dark:text-slate-600 font-bold uppercase tracking-widest mt-0.5">${entry.timestamp || ''}</p>
                                </div>
                                <span id="log-chev-${entry.id}" class="log-chevron text-slate-400 font-black text-sm flex-shrink-0">▼</span>
                            </button>
                            <div id="log-body-${entry.id}" class="log-body">
                                <div class="px-4 pb-4 space-y-3 border-t dark:border-slate-700 pt-3">
                                    <div class="space-y-1">
                                        <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest mb-2">Administration</p>
                                        ${Object.entries(entry.admin || {}).map(([k, v]) => `<div class="flex justify-between text-xs border-b pb-1 dark:border-slate-700"><span>${k}</span><span class="font-bold text-right ml-4">${v}</span></div>`).join('')}
                                    </div>
                                    <div class="pt-2 border-t dark:border-slate-700">
                                        <p class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest mb-2">Narrative</p>
                                        <p class="text-xs leading-relaxed whitespace-pre-wrap text-slate-700 dark:text-slate-300 font-medium">${entry.narrative || 'No notes recorded.'}</p>
                                    </div>
                                    ${checksHtml}
                                    <div class="flex gap-2 pt-2">
                                        <button onclick="copyLogReport(${entry.id})" class="btn btn-primary flex-1 text-[11px] py-2.5">Copy Report</button>
                                        <button onclick="deleteLogEntry(${entry.id})" class="btn btn-secondary text-[11px] py-2.5 px-4" style="color:var(--accent-red);border-color:var(--accent-red);">Delete</button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                    <button onclick="goHome()" class="btn btn-secondary w-full mt-2">Back to Menu</button>
                </div>`;
        }
        function renderTextPage(container, type) {
            const h = type === 'about' ? "About StationBrain" : "Legal Disclaimer";
            const p = type === 'about'
                ? `StationBrain is a station-level decision-support and record-keeping tool created for use within the Jamaica Fire Brigade. It is designed to help on-duty crews organize station information, track routine activities, and generate clear, consistent reports that support smoother handovers and better situational awareness during a shift.<br><br>The app pulls together information that would normally live in paper logs, notebooks, or on the whiteboard and structures it in one place for easier review. StationBrain is intended to complement, not replace, the Brigade's official procedures, command structure, or mandated documentation. All operational decisions must continue to follow official JFB policies, orders, and the established chain of command.<br><br>StationBrain is currently used on a personal basis at a single station and is developed from a frontline firefighter's perspective with a focus on practicality, speed under pressure, and clarity of records rather than complex automation.`
                : `1. General information only<br>StationBrain provides tools, logs, and reports for general information and record-keeping purposes at the station level. It does not provide professional, legal, medical, or safety-critical advice and must not be treated as the final authority for any operational, tactical, or staffing decision.<br><br>2. Not an official Jamaica Fire Brigade system<br>StationBrain is a personal tool used within the Jamaica Fire Brigade and is not an official, authorized, or mandated JFB system. It does not replace any official Brigade systems, forms, reports, or documentation and must not be used where the Brigade requires specific official records or platforms. In any conflict between StationBrain and official JFB policies, the official policies and orders always prevail.<br><br>3. No emergency or incident command function<br>StationBrain is not an emergency notification system, incident command platform, or life-safety device. It must never be relied on as the sole source for incident information, crew status, resource availability, or tactical decisions. Users must always follow official radio procedures, command decisions, and safety protocols.<br><br>4. No professional, medical, or legal advice<br>Nothing in StationBrain, including any data, analytics, guidance, or generated reports, is intended to constitute medical advice, legal advice, or any other kind of professional advice. Users must rely on their training, supervisors, and qualified professionals when making decisions that could affect health, safety, employment, or legal rights.`;
            container.innerHTML = `<div class="card p-8 space-y-4 shadow-sm"><h2 class="font-black text-xl text-blue-600 dark:text-blue-400">${h}</h2><p class="text-sm leading-relaxed text-slate-600 dark:text-slate-400">${p}</p><button onclick="goHome()" class="btn btn-secondary w-full">Back</button></div>`;
        }

        async function copyReport() {
            const r = state.report;
            if (!r) return;
            const text = formatReportText({
                mode: state.mode,
                timestamp: r.timestamp || new Date().toLocaleString('en-JM', { dateStyle: 'medium', timeStyle: 'short' }),
                admin: r.admin || {},
                narrative: r.narrative || 'No notes recorded.',
                checks: r.checks || []
            });
            try {
                await navigator.clipboard.writeText(text);
                alert("Report copied.");
            } catch {
                alert("Copy failed. Please copy manually.");
            }
        }
        render();
    </script>
    <!-- PWA: Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('StationBrain SW registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
